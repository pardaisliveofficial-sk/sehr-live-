name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Native Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Assets to Android Native
        run: npx cap sync android

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download Valid Gradle Wrapper JAR
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release APK (Unsigned)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build Android Release App Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Build Android Debug APK (Immediately Installable)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
