name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Native Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check package-lock.json existence
        id: check_lock
        run: |
          if [ -f "package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js Environment (with Cache)
        if: steps.check_lock.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Node.js Environment (without Cache)
        if: steps.check_lock.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Recreate Android Assets from SVG (Icons & Splash)
        run: node android-recreate-icons.cjs

      - name: Build Web Application
        run: npm run build

      - name: Sync Assets to Android Native
        run: npx cap sync android

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download Valid Gradle Wrapper JAR
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Configure Android Signing Key
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Decoding custom release keystore..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "RELEASE_STORE_FILE=release.keystore" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
          else
            echo "No custom release keystore secret found. Generating temporary build-time keystore..."
            keytool -genkey -v -keystore android/app/release.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Build, O=Android, C=US"
            echo "RELEASE_STORE_FILE=release.keystore" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=android" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=android" >> $GITHUB_ENV
          fi

      - name: Build Android Release APK (Signed)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build Android Release App Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Build Android Debug APK (Immediately Installable)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
