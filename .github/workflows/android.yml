name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Native Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check package-lock.json existence
        id: check_lock
        run: |
          if [ -f "package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js Environment (with Cache)
        if: steps.check_lock.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Node.js Environment (without Cache)
        if: steps.check_lock.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Recreate Android Assets from SVG (Icons & Splash)
        run: node android-recreate-icons.cjs

      - name: Build Web Application
        run: npm run build

      - name: Sync Assets to Android Native
        run: npx cap sync android

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download Valid Gradle Wrapper JAR
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Configure Android Signing Key
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p android/app
          # Remove any existing temporary or leftover keystore files to start clean
          rm -f android/app/release.keystore android/app/release-key.jks android/app/*.p12

          KEYSTORE_VALID=false

          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Decoding custom release keystore secret..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release-custom.keystore
            STORE_PASS="${RELEASE_STORE_PASSWORD:-android123}"
            KEY_ALIAS="${RELEASE_KEY_ALIAS:-release}"
            KEY_PASS="${RELEASE_KEY_PASSWORD:-android123}"

            if [ -s android/app/release-custom.keystore ] && keytool -list -keystore android/app/release-custom.keystore -storepass "$STORE_PASS" > /dev/null 2>&1; then
              echo "✅ Custom release keystore validated successfully!"
              KEYSTORE_VALID=true
              echo "RELEASE_STORE_FILE=release-custom.keystore" >> $GITHUB_ENV
              echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV
              echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
              echo "RELEASE_KEY_PASSWORD=$KEY_PASS" >> $GITHUB_ENV
            else
              echo "⚠️ Custom release keystore secret invalid or empty. Falling back to temporary JKS keystore..."
              rm -f android/app/release-custom.keystore
            fi
          fi

          if [ "$KEYSTORE_VALID" != "true" ]; then
            echo "Generating temporary build-time JKS keystore..."
            rm -f android/app/release-key.jks
            keytool -genkeypair -v \
              -keystore android/app/release-key.jks \
              -storetype JKS \
              -storepass android123 \
              -keypass android123 \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Sehr Live, OU=Mobile, O=Sehr Live, L=City, ST=State, C=PK"

            echo "RELEASE_STORE_FILE=release-key.jks" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=android123" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=release" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=android123" >> $GITHUB_ENV
            echo "RELEASE_STORE_TYPE=JKS" >> $GITHUB_ENV
          fi

          echo "Validating keystore existence and size..."
          TARGET_KS="${RELEASE_STORE_FILE:-release-key.jks}"
          TARGET_PASS="${RELEASE_STORE_PASSWORD:-android123}"
          TARGET_ALIAS="${RELEASE_KEY_ALIAS:-release}"

          if [ ! -s "android/app/$TARGET_KS" ]; then
            echo "❌ Error: Keystore file android/app/$TARGET_KS is missing or empty!"
            exit 1
          fi

          echo "Validating final release keystore with keytool..."
          keytool -list -v -keystore "android/app/$TARGET_KS" -storepass "$TARGET_PASS" -alias "$TARGET_ALIAS"

      - name: Build Android Release APK (Signed)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build Android Release App Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Build Android Debug APK (Immediately Installable)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sehr-live-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
